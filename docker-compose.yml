services:
  rasa:
    image: rasa/rasa:3.6.15-full
    ports:
      - "5005:5005"
    volumes:
      - .:/app
    user: "root"
    entrypoint: ""
    command: >
      bash -c "rasa train && rasa run --enable-api --cors '*' --port 5005"
    depends_on:
      - actions

  actions:
    build:
      context: .
      dockerfile: actions/Dockerfile
    ports:
      - "5055:5055"
      - "5056:5056"
    environment:
      GOOGLE_API_KEY: "${GEMINI_API_KEY}"
    volumes:
      - .:/app
    depends_on:
      - farmarag

  farmarag:
    build:
      context: ../RAG-project         
      dockerfile: Dockerfile          
    ports:
      - "8000:8000"
    environment:
      GOOGLE_API_KEY: "${GOOGLE_API_KEY}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5174"
    depends_on:
      - rasa