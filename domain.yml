version: "3.1"

intents:
  - saludo
  - ayuda
  - consulta_auditoria
  - fuera_tema

responses:
  utter_greeting:
    - text: "Buenos días. Soy el asistente de auditoría farmacéutica. ¿En qué puedo ayudarle?"
    - text: "Buenos días. Estoy aquí para asistirle con consultas sobre normativas de auditoría. ¿Tiene alguna pregunta?"

  utter_help:
    - text: |
        Puedo asistirle con las siguientes consultas:
        • Normativas de auditoría PAMI
        • Requisitos DIM
        • Regulaciones COFAER
        • Normas OSER
        • Información sobre recetas médicas
        • Consultas sobre cadenas de frío
        ¿Qué desea consultar?

  utter_fuera_tema:
    - text: |
        Mi función es asistirle específicamente con consultas de auditoría farmacéutica.
        ¿Tiene alguna pregunta sobre PAMI, DIM, COFAER u OSER?
    - text: |
        Respecto a temas ajenos a la auditoría farmacéutica, le recomiendo consultar con el profesional correspondiente.
        ¿Hay alguna consulta sobre normativas de auditoría que pueda atender?

  utter_consulta_auditoria_error:
    - text: |
        Disculpe, no he podido procesar su consulta de auditoría en este momento.
        Por favor, intente nuevamente o reformule su pregunta.

  utter_clarification:
    - text: "¿Para qué obra social o auditoría? (PAMI, DIM, COFAER, OSER)"

flows:
  saludo:
    id: saludo
    description: Flujo de saludo formal
    steps:
      - intent: saludo
      - action: utter_greeting

  ayuda:
    id: ayuda
    description: Flujo de ayuda con capacidades del sistema
    steps:
      - intent: ayuda
      - action: utter_help

  fuera_tema:
    id: fuera_tema
    description: Flujo para consultas fuera del dominio de auditoría
    steps:
      - intent: fuera_tema
      - action: utter_fuera_tema

  consulta_auditoria:
    id: consulta_auditoria
    description: Flujo principal de consulta de auditoría vía A2A
    steps:
      - intent: consulta_auditoria
      - action: call: farmarag_agent
      - action: utter_consulta_auditoria_result