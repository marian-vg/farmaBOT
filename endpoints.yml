action_endpoint:
  url: http://actions:5055/webhook

model_groups:
  - id: default_llm
    models:
      - provider: gemini
        model: gemini-2.5-flash
        api_key: ${GEMINI_API_KEY}
        timeout: 60
  - id: default_embeddings
    models:
      - provider: gemini
        model: gemini-embedding-001
        api_key: ${GEMINI_API_KEY}
        timeout: 20
