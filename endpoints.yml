action_endpoint:
  url: http://localhost:5055/webhook

model_groups:
  - id: default_llm
    models:
      - provider: gemini
        model: gemini-2.5-flash
        api_key: ${GEMINI_API_KEY}
        timeout: 15
  - id: default_embeddings
    models:
      - provider: ollama
        model: nomic-embed-text:latest
        api_base: http://localhost:11434
        timeout: 10
